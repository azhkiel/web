<!DOCTYPE html>
<html lang="id" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkJar — Simpan Linkmu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Ganti Lucide dengan Font Awesome yang lebih ringan dan sudah di-cache -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50:  '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            },
            duo: {
              green:  '#58CC02',
              greend: '#3f9100',
              red:    '#FF4B4B',
              redd:   '#cc2222',
              yellow: '#FFC800',
            }
          },
          fontFamily: {
            nunito: ['Nunito', 'sans-serif'],
          },
          borderRadius: {
            '3xl': '1.5rem',
            '4xl': '2rem',
          },
          keyframes: {
            bounceIn: {
              '0%':   { transform: 'scale(0.7)', opacity: '0' },
              '60%':  { transform: 'scale(1.06)' },
              '100%': { transform: 'scale(1)',   opacity: '1' },
            },
            slideUp: {
              '0%':   { transform: 'translateY(16px)', opacity: '0' },
              '100%': { transform: 'translateY(0)',    opacity: '1' },
            },
            fadeIn: {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
            float: {
              '0%,100%': { transform: 'translateY(0px)' },
              '50%':     { transform: 'translateY(-10px)' },
            },
            shake: {
              '0%,100%':              { transform: 'translateX(0)' },
              '10%,30%,50%,70%,90%': { transform: 'translateX(-6px)' },
              '20%,40%,60%,80%':     { transform: 'translateX(6px)' },
            },
            dotPulse: {
              '0%,80%,100%': { transform: 'scale(0.6)', opacity: '0.4' },
              '40%':         { transform: 'scale(1)',   opacity: '1' },
            },
            fadeOut: {
              to: { opacity: '0', transform: 'translateX(16px)' },
            },
            spin: {
              to: { transform: 'rotate(360deg)' }
            }
          },
          animation: {
            'bounce-in': 'bounceIn 0.4s cubic-bezier(0.36,0.07,0.19,0.97)',
            'slide-up':  'slideUp 0.35s ease-out',
            'fade-in':   'fadeIn 0.3s ease-out',
            'float':     'float 3.5s ease-in-out infinite',
            'shake':     'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            'fade-out':  'fadeOut 0.3s ease-in forwards',
            'spin':      'spin 0.8s linear infinite',
          }
        }
      }
    }
  </script>

  <style>
    * { font-family: 'Nunito', sans-serif; }

    body {
      background: linear-gradient(145deg, #e0f2fe 0%, #f0f9ff 60%, #f0f9ff 100%);
      min-height: 100vh;
    }

    /* Blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(60px);
      animation: float 7s ease-in-out infinite;
    }

    /* Duolingo button press */
    .btn-sky {
      background: #0ea5e9;
      box-shadow: 0 5px 0 #0369a1;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .btn-sky:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #0369a1; }
    .btn-sky:active { transform: translateY(3px);  box-shadow: 0 2px 0 #0369a1; }

    .btn-green {
      background: #58CC02;
      box-shadow: 0 5px 0 #3f9100;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .btn-green:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #3f9100; }
    .btn-green:active { transform: translateY(3px);  box-shadow: 0 2px 0 #3f9100; }

    /* Card */
    .link-card {
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    }
    .link-card:hover {
      transform: translateY(-4px) scale(1.008);
      box-shadow: 0 18px 36px rgba(14,165,233,0.15);
    }

    /* Focus glow */
    .input-sky:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.3);
    }

    /* Shake */
    .is-shaking { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

    /* Dot loader */
    .dot-pulse span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      margin: 0 2px;
      animation: dotPulse 1.3s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.18s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.36s; }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: #e0f2fe; border-radius: 8px; }
    ::-webkit-scrollbar-thumb { background: #7dd3fc; border-radius: 8px; }

    /* Backdrop blur for modals */
    .modal-bg {
      backdrop-filter: blur(10px);
      background: rgba(7, 89, 133, 0.12);
    }

    /* Logo icon bg */
    .logo-bg {
      background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
    }

    /* Toast slide */
    .toast-in { animation: slideUp 0.3s ease-out; }

    /* Domain pill */
    .domain-pill {
      font-size: 0.6rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* Streak pill */
    .streak-pill {
      background: linear-gradient(135deg, #FFC800 0%, #ff9500 100%);
    }

    [x-cloak] { display: none !important; }
  </style>
</head>

<body x-cloak>

  <!-- BG Blobs -->
  <div class="blob w-[28rem] h-[28rem] bg-sky-300 opacity-20 top-[-6rem] left-[-6rem]" style="animation-delay:0s"></div>
  <div class="blob w-72 h-72 bg-sky-400 opacity-15 bottom-[5%] right-[-3rem]" style="animation-delay:2.5s"></div>
  <div class="blob w-52 h-52 bg-sky-200 opacity-20 top-[45%] left-[3%]" style="animation-delay:5s"></div>

  <!-- ======================================================= -->
  <!-- TOASTS                                                   -->
  <!-- ======================================================= -->
  <div class="fixed top-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div
        class="toast-in pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl font-bold text-sm max-w-[18rem]"
        :class="{
          'bg-duo-green text-white':  toast.type === 'success',
          'bg-duo-red text-white':    toast.type === 'error',
          'bg-sky-500 text-white':    toast.type === 'info',
        }"
      >
        <i class="fas" :class="{
          'fa-check-circle': toast.type === 'success',
          'fa-times-circle': toast.type === 'error',
          'fa-info-circle': toast.type === 'info'
        }"></i>
        <span x-text="toast.message"></span>
      </div>
    </template>
  </div>

  <!-- ======================================================= -->
  <!-- LOGIN MODAL                                              -->
  <!-- ======================================================= -->
  <div
    x-show="!isLoggedIn"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="fixed inset-0 z-50 flex items-center justify-center modal-bg"
  >
    <div
      x-show="!isLoggedIn"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 scale-75"
      x-transition:enter-end="opacity-100 scale-100"
      :class="loginShake ? 'is-shaking' : ''"
      class="bg-white rounded-4xl shadow-2xl p-8 w-full max-w-sm mx-4 relative overflow-hidden"
    >
      <!-- Top accent -->
      <div class="absolute inset-x-0 top-0 h-1.5 bg-gradient-to-r from-sky-400 via-sky-500 to-sky-400 rounded-t-4xl"></div>

      <!-- Logo area -->
      <div class="flex flex-col items-center mb-7 mt-1">
        <div class="logo-bg w-16 h-16 rounded-3xl flex items-center justify-center shadow-lg mb-3 animate-float">
          <i class="fas fa-archive text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black text-sky-700 tracking-tight">LinkJar</h1>
        <p class="text-sky-400 font-semibold text-sm mt-1">Simpan semua linkmu di satu tempat</p>
      </div>

      <!-- Fields -->
      <div class="space-y-4">
        <!-- Username -->
        <div>
          <label class="block text-sky-700 font-bold text-sm mb-1.5">Username</label>
          <div class="relative">
            <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-sky-300 text-sm"></i>
            <input
              type="text"
              x-model="loginForm.username"
              @keydown.enter="login()"
              placeholder="username kamu..."
              class="input-sky w-full pl-10 pr-4 py-3 border-2 border-sky-200 rounded-2xl font-semibold text-gray-700 placeholder-sky-200 bg-sky-50 transition-colors"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sky-700 font-bold text-sm mb-1.5">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-sky-300 text-sm"></i>
            <input
              :type="showPassword ? 'text' : 'password'"
              x-model="loginForm.password"
              @keydown.enter="login()"
              placeholder="••••••••"
              class="input-sky w-full pl-10 pr-12 py-3 border-2 border-sky-200 rounded-2xl font-semibold text-gray-700 placeholder-sky-300 bg-sky-50 transition-colors"
            />
            <button
              @click="showPassword = !showPassword"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-sky-300 hover:text-sky-500 transition-colors"
              tabindex="-1"
              type="button"
            >
              <i class="fas" :class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          @click="login()"
          :disabled="loginLoading"
          class="btn-sky w-full text-white font-black text-base py-3.5 rounded-2xl flex items-center justify-center gap-2 mt-1"
          type="button"
        >
          <template x-if="loginLoading">
            <div class="dot-pulse text-white"><span></span><span></span><span></span></div>
          </template>
          <template x-if="!loginLoading">
            <span class="flex items-center gap-2">
              <i class="fas fa-sign-in-alt"></i>
              Masuk
            </span>
          </template>
        </button>
      </div>

      <p class="text-center text-sky-300 text-xs font-semibold mt-5">
        Akun dikelola oleh admin via Google Sheets
      </p>
    </div>
  </div>

  <!-- ======================================================= -->
  <!-- MODAL TAMBAH LINK                                        -->
  <!-- ======================================================= -->
  <div
    x-show="showAddModal"
    @click.self="showAddModal = false"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-center justify-center modal-bg"
  >
    <div
      x-show="showAddModal"
      x-transition:enter="transition ease-out duration-250"
      x-transition:enter-start="opacity-0 scale-90 -translate-y-3"
      x-transition:enter-end="opacity-100 scale-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-90"
      class="bg-white rounded-4xl shadow-2xl p-8 w-full max-w-md mx-4 relative"
    >
      <div class="absolute inset-x-0 top-0 h-1.5 bg-gradient-to-r from-duo-green via-sky-400 to-sky-500 rounded-t-4xl"></div>

      <!-- Header -->
      <div class="flex items-start justify-between mb-6 mt-1">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-sky-100 rounded-2xl flex items-center justify-center">
            <i class="fas fa-link text-sky-500"></i>
          </div>
          <div>
            <h2 class="text-xl font-black text-sky-700">Tambah Link</h2>
            <p class="text-sky-400 text-xs font-semibold">Simpan link favoritmu</p>
          </div>
        </div>
        <button
          @click="showAddModal = false"
          class="w-8 h-8 rounded-xl hover:bg-sky-50 text-sky-300 hover:text-sky-500 transition-all flex items-center justify-center"
          type="button"
        >
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="space-y-4">
        <!-- URL field -->
        <div>
          <label class="flex items-center gap-1.5 text-sky-700 font-bold text-sm mb-1.5">
            <i class="fas fa-globe text-xs"></i>
            URL / Link
          </label>
          <input
            type="url"
            x-model="addForm.link"
            placeholder="https://example.com"
            class="input-sky w-full px-4 py-3 border-2 border-sky-200 rounded-2xl font-semibold text-gray-700 placeholder-sky-200 bg-sky-50 transition-colors"
          />
          <p x-show="urlError" class="flex items-center gap-1 text-duo-red text-xs font-bold mt-1.5" x-text="urlError">
          </p>
        </div>

        <!-- Caption field -->
        <div>
          <label class="flex items-center gap-1.5 text-sky-700 font-bold text-sm mb-1.5">
            <i class="fas fa-i-cursor text-xs"></i>
            Caption
          </label>
          <textarea
            x-model="addForm.caption"
            placeholder="Ceritain dikit, ini link apa..."
            rows="3"
            class="input-sky w-full px-4 py-3 border-2 border-sky-200 rounded-2xl font-semibold text-gray-700 placeholder-sky-200 bg-sky-50 transition-colors resize-none"
          ></textarea>
          <p x-show="captionError" class="flex items-center gap-1 text-duo-red text-xs font-bold mt-1.5" x-text="captionError"></p>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 pt-1">
          <button
            @click="showAddModal = false"
            class="flex-1 py-3 rounded-2xl border-2 border-sky-200 text-sky-500 font-black hover:bg-sky-50 transition-colors flex items-center justify-center gap-2"
            type="button"
          >
            <i class="fas fa-times"></i>
            Batal
          </button>
          <button
            @click="addLink()"
            :disabled="addLoading"
            class="btn-green flex-grow py-3 rounded-2xl text-white font-black flex items-center justify-center gap-2"
            type="button"
          >
            <template x-if="addLoading">
              <div class="dot-pulse text-white"><span></span><span></span><span></span></div>
            </template>
            <template x-if="!addLoading">
              <span class="flex items-center gap-2">
                <i class="fas fa-save"></i>
                Simpan
              </span>
            </template>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ======================================================= -->
  <!-- DASHBOARD                                                -->
  <!-- ======================================================= -->
  <div
    x-show="isLoggedIn"
    x-transition:enter="transition ease-out duration-400"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="min-h-screen"
  >
    <!-- HEADER -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b-2 border-sky-100">
      <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">

        <!-- Logo + User -->
        <div class="flex items-center gap-3">
          <div class="logo-bg w-9 h-9 rounded-xl flex items-center justify-center shadow-md flex-shrink-0">
            <i class="fas fa-archive text-white text-sm"></i>
          </div>
          <div class="leading-tight">
            <h1 class="text-lg font-black text-sky-700">LinkJar</h1>
            <p class="text-xs text-sky-400 font-semibold flex items-center gap-1">
              <i class="fas fa-user-circle text-xs"></i>
              <span x-text="currentUser"></span>
            </p>
          </div>
        </div>

        <!-- Right controls -->
        <div class="flex items-center gap-2">
          <!-- Link count badge -->
          <div class="streak-pill flex items-center gap-1.5 px-3 py-1.5 rounded-xl shadow-sm">
            <i class="fas fa-bookmark text-white text-xs"></i>
            <span class="text-white font-black text-sm" x-text="links.length"></span>
          </div>

          <!-- Logout -->
          <button
            @click="logout()"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-sky-100 text-sky-600 font-bold text-sm hover:bg-sky-200 transition-colors"
            type="button"
          >
            <i class="fas fa-sign-out-alt text-xs"></i>
            Keluar
          </button>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-2xl mx-auto px-4 py-6">

      <!-- Page title + Add button -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-black text-sky-800">Link Kamu</h2>
          <p class="text-sky-400 font-semibold text-sm flex items-center gap-1.5 mt-0.5">
            <i class="fas fa-database text-xs"></i>
            <span x-text="links.length > 0 ? links.length + ' link tersimpan' : 'Belum ada link'"></span>
          </p>
        </div>
        <button
          @click="openAddModal()"
          class="btn-sky text-white font-black px-5 py-3 rounded-2xl flex items-center gap-2"
          type="button"
        >
          <i class="fas fa-plus"></i>
          Tambah
        </button>
      </div>

      <!-- Search -->
      <div x-show="links.length > 0" class="relative mb-5">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-sky-300 text-sm"></i>
        <input
          type="text"
          x-model="searchQuery"
          placeholder="Cari link atau caption..."
          class="input-sky w-full pl-11 pr-4 py-3 border-2 border-sky-200 rounded-2xl font-semibold text-gray-700 placeholder-sky-200 bg-white transition-colors shadow-sm"
        />
        <!-- Clear search -->
        <button
          x-show="searchQuery"
          @click="searchQuery = ''"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-sky-300 hover:text-sky-500 transition-colors"
          type="button"
        >
          <i class="fas fa-times-circle"></i>
        </button>
      </div>

      <!-- Loading -->
      <div x-show="loadingLinks" class="flex flex-col items-center py-16 gap-4">
        <div class="w-14 h-14 logo-bg rounded-3xl flex items-center justify-center shadow-lg">
          <i class="fas fa-spinner fa-spin text-white text-2xl"></i>
        </div>
        <div class="dot-pulse text-sky-400"><span></span><span></span><span></span></div>
        <p class="text-sky-400 font-bold text-sm">Mengambil linkmu...</p>
      </div>

      <!-- Empty State -->
      <div
        x-show="!loadingLinks && filteredLinks.length === 0 && links.length === 0"
        class="flex flex-col items-center py-16 gap-4 text-center animate-fade-in"
      >
        <div class="w-24 h-24 bg-sky-100 rounded-4xl flex items-center justify-center animate-float shadow-inner">
          <i class="fas fa-inbox text-5xl text-sky-300"></i>
        </div>
        <h3 class="text-xl font-black text-sky-700">Jarnya masih kosong!</h3>
        <p class="text-sky-400 font-semibold max-w-xs text-sm leading-relaxed">
          Yuk mulai simpan link pertamamu. Klik tombol <strong class="text-sky-600">+ Tambah</strong> di atas!
        </p>
        <button
          @click="openAddModal()"
          class="btn-sky text-white font-black px-6 py-3 rounded-2xl flex items-center gap-2 mt-2"
          type="button"
        >
          <i class="fas fa-plus-circle"></i>
          Tambah Link Pertama
        </button>
      </div>

      <!-- No search result -->
      <div
        x-show="!loadingLinks && filteredLinks.length === 0 && links.length > 0"
        class="flex flex-col items-center py-12 gap-3 text-center"
      >
        <div class="w-16 h-16 bg-sky-100 rounded-3xl flex items-center justify-center">
          <i class="fas fa-search text-3xl text-sky-300"></i>
        </div>
        <p class="text-sky-600 font-bold">
          Tidak ada hasil untuk "<span x-text="searchQuery" class="text-sky-800"></span>"
        </p>
        <button @click="searchQuery=''" class="text-sky-400 text-sm font-semibold hover:text-sky-600 underline">
          Hapus pencarian
        </button>
      </div>

      <!-- LINK CARDS -->
      <div class="space-y-3.5">
        <template x-for="(item, index) in filteredLinks" :key="item.id || index">
          <div
            class="link-card bg-white rounded-3xl shadow-sm border-2 border-sky-100 p-5 relative overflow-hidden"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-3"
            x-transition:enter-end="opacity-100 translate-y-0"
          >
            <!-- Left accent -->
            <div class="absolute left-0 top-5 bottom-5 w-1 bg-gradient-to-b from-sky-400 to-sky-200 rounded-r-full"></div>

            <div class="pl-4">
              <!-- Caption -->
              <p class="text-gray-800 font-bold text-[15px] mb-3 leading-snug" x-text="item.caption || '(Tanpa caption)'"></p>

              <!-- URL row -->
              <a
                :href="item.link"
                target="_blank"
                rel="noopener noreferrer"
                class="flex items-center gap-2 group w-full"
              >
                <!-- Favicon dengan lazy loading -->
                <img
                  loading="lazy"
                  :src="getFaviconUrl(item.link)"
                  class="w-4 h-4 rounded object-cover flex-shrink-0"
                  @error="$event.target.style.display='none'"
                />
                <span
                  class="text-sky-500 font-semibold text-sm truncate group-hover:text-sky-700 group-hover:underline transition-colors flex-1"
                  x-text="item.link"
                ></span>
                <i class="fas fa-external-link-alt text-sky-300 group-hover:text-sky-500 transition-colors text-xs flex-shrink-0"></i>
              </a>

              <!-- Footer meta -->
              <div class="flex items-center justify-between mt-3 pt-2.5 border-t border-sky-50">
                <!-- User -->
                <div class="flex items-center gap-1.5">
                  <span class="flex w-5 h-5 bg-sky-100 rounded-full text-sky-400 items-center justify-center">
                    <i class="fas fa-user text-xs"></i>
                  </span>
                  <span class="text-sky-400 text-xs font-bold" x-text="item.username"></span>
                </div>

                <!-- Right meta -->
                <div class="flex items-center gap-2">
                  <span
                    class="domain-pill bg-sky-50 text-sky-400 font-extrabold px-2 py-0.5 rounded-lg"
                    x-text="getDomain(item.link)"
                  ></span>
                  <span class="flex items-center gap-1 text-sky-300 text-xs font-semibold">
                    <i class="far fa-clock text-xs"></i>
                    <span x-text="formatDate(item.timestamp)"></span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div class="h-20"></div>
    </main>

    <!-- FAB mobile -->
    <button
      @click="openAddModal()"
      class="btn-sky fixed bottom-6 right-6 z-30 w-14 h-14 rounded-full text-white flex items-center justify-center sm:hidden"
      style="box-shadow: 0 5px 0 #0369a1, 0 10px 24px rgba(14,165,233,0.35)"
      type="button"
    >
      <i class="fas fa-plus text-xl"></i>
    </button>
  </div>

  <!-- ======================================================= -->
  <!-- ALPINE.JS LOGIC (OPTIMIZED)                             -->
  <!-- ======================================================= -->
  <script>
    // ⚠️ Ganti dengan URL Google Apps Script kamu
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyCiVTn-7agMzw3r7ywgVqYEgYUlP8TC8IOmWmL7c9mJuOUVoZ0wVOPVLRLcP6lgS4dDw/exec';

    function app() {
      return {
        isLoggedIn:   false,
        currentUser:  '',
        showPassword: false,

        loginForm:    { username: '', password: '' },
        loginLoading: false,
        loginShake:   false,

        links:        [],
        loadingLinks: false,
        searchQuery:  '',
        showAddModal: false,

        addForm:      { link: '', caption: '' },
        addLoading:   false,
        urlError:     '',
        captionError: '',

        toasts:       [],
        
        // Cache untuk favicon
        faviconCache: {},

        // ---- computed dengan debounce ----
        get filteredLinks() {
          if (!this.searchQuery.trim()) return this.links;
          const q = this.searchQuery.toLowerCase();
          return this.links.filter(l =>
            (l.caption || '').toLowerCase().includes(q) ||
            (l.link    || '').toLowerCase().includes(q)
          );
        },

        // ---- init - optimized ----
        init() {
          const saved = localStorage.getItem('linkjar_session');
          if (saved) {
            try {
              const s = JSON.parse(saved);
              if (s.user) {
                this.currentUser = s.user;
                this.isLoggedIn  = true;
                this.fetchLinks();
              }
            } catch { localStorage.removeItem('linkjar_session'); }
          }
        },

        // ---- login ----
        async login() {
          if (!this.loginForm.username.trim()) { this.showToast('Username tidak boleh kosong!', 'error'); this.shake(); return; }
          if (!this.loginForm.password.trim()) { this.showToast('Password tidak boleh kosong!',  'error'); this.shake(); return; }

          this.loginLoading = true;
          try {
            const res  = await fetch(GAS_URL, {
              method:  'POST',
              headers: { 'Content-Type': 'text/plain' },
              body:    JSON.stringify({ action: 'login', username: this.loginForm.username.trim(), password: this.loginForm.password }),
            });
            const data = await res.json();
            if (data.status === 'success') {
              this.currentUser = this.loginForm.username.trim();
              this.isLoggedIn  = true;
              localStorage.setItem('linkjar_session', JSON.stringify({ user: this.currentUser }));
              this.loginForm   = { username: '', password: '' };
              this.showToast('Selamat datang, ' + this.currentUser + '!', 'success');
              this.fetchLinks();
            } else {
              this.showToast(data.message || 'Username atau password salah!', 'error');
              this.shake();
            }
          } catch {
            if (GAS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') { this.demoLogin(); }
            else { this.showToast('Gagal terhubung ke server.', 'error'); this.shake(); }
          } finally {
            this.loginLoading = false;
          }
        },

        demoLogin() {
          if (this.loginForm.username === 'demo' && this.loginForm.password === 'demo') {
            this.currentUser = 'demo';
            this.isLoggedIn  = true;
            localStorage.setItem('linkjar_session', JSON.stringify({ user: 'demo' }));
            this.loginForm   = { username: '', password: '' };
            this.showToast('Mode Demo — GAS URL belum dikonfigurasi', 'info');
            this.loadDemoData();
          } else {
            this.showToast('Demo: gunakan demo / demo', 'error');
            this.shake();
          }
        },

        loadDemoData() {
          this.links = [
            { id:1, timestamp: new Date().toISOString(),                       username:'demo', link:'https://google.com',  caption:'Mesin pencari favorit, mulai dari sini' },
            { id:2, timestamp: new Date(Date.now()-86400000).toISOString(),    username:'demo', link:'https://github.com',  caption:'Repositori kode, kolaborasi tim' },
            { id:3, timestamp: new Date(Date.now()-172800000).toISOString(),   username:'demo', link:'https://youtube.com', caption:'Video tutorial dan hiburan' },
          ];
        },

        logout() {
          this.isLoggedIn  = false;
          this.currentUser = '';
          this.links       = [];
          this.searchQuery = '';
          this.faviconCache = {};
          localStorage.removeItem('linkjar_session');
          this.showToast('Sampai jumpa!', 'info');
        },

        // ---- fetch links dengan timeout ----
        async fetchLinks() {
          if (GAS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') { this.loadDemoData(); return; }
          this.loadingLinks = true;
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const res = await fetch(`${GAS_URL}?username=${encodeURIComponent(this.currentUser)}`, { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await res.json();
            if (data.status === 'success') {
              this.links = (data.data || []).reverse();
            } else {
              this.showToast('Gagal mengambil data.', 'error');
            }
          } catch (err) {
            if (err.name === 'AbortError') {
              this.showToast('Request timeout, cek koneksi internet.', 'error');
            } else {
              this.showToast('Gagal terhubung ke server.', 'error');
            }
          } finally { 
            this.loadingLinks = false; 
          }
        },

        openAddModal() {
          this.addForm     = { link:'', caption:'' };
          this.urlError    = '';
          this.captionError= '';
          this.showAddModal= true;
        },

        validateURL(s) {
          try { const u = new URL(s); return u.protocol==='http:' || u.protocol==='https:'; }
          catch { return false; }
        },

        async addLink() {
          this.urlError = ''; this.captionError = '';
          let ok = true;
          if (!this.addForm.link.trim())                           { this.urlError     = 'URL tidak boleh kosong!';            ok = false; }
          else if (!this.validateURL(this.addForm.link.trim()))   { this.urlError     = 'URL tidak valid (gunakan https://…)'; ok = false; }
          if (!this.addForm.caption.trim())                        { this.captionError = 'Caption tidak boleh kosong!';        ok = false; }
          if (!ok) return;

          this.addLoading = true;

          if (GAS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
            await new Promise(r => setTimeout(r, 500));
            this.links.unshift({ id: Date.now(), timestamp: new Date().toISOString(), username: this.currentUser, link: this.addForm.link.trim(), caption: this.addForm.caption.trim() });
            this.showAddModal = false;
            this.addLoading   = false;
            this.showToast('Link berhasil disimpan!', 'success');
            return;
          }

          try {
            const res  = await fetch(GAS_URL, {
              method:  'POST',
              headers: { 'Content-Type': 'text/plain' },
              body:    JSON.stringify({ action:'addLink', username: this.currentUser, link: this.addForm.link.trim(), caption: this.addForm.caption.trim() }),
            });
            const data = await res.json();
            if (data.status === 'success') {
              this.showAddModal = false;
              this.showToast('Link berhasil disimpan!', 'success');
              this.fetchLinks();
            } else { this.showToast(data.message || 'Gagal menyimpan link.', 'error'); }
          } catch { this.showToast('Gagal terhubung ke server.', 'error'); }
          finally  { this.addLoading = false; }
        },

        // ---- helpers dengan caching ----
        getDomain(url) {
          try { return new URL(url).hostname.replace('www.',''); } catch { return ''; }
        },
        
        getFaviconUrl(link) {
          const domain = this.getDomain(link);
          if (!domain) return '';
          if (this.faviconCache[domain]) return this.faviconCache[domain];
          const url = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
          this.faviconCache[domain] = url;
          return url;
        },

        formatDate(ts) {
          if (!ts) return '';
          try {
            const d    = new Date(ts);
            const diff = Math.floor((Date.now() - d) / 1000);
            if (diff < 60)     return 'baru saja';
            if (diff < 3600)   return Math.floor(diff/60)   + ' mnt lalu';
            if (diff < 86400)  return Math.floor(diff/3600) + ' jam lalu';
            if (diff < 604800) return Math.floor(diff/86400)+ ' hr lalu';
            return d.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
          } catch { return ts; }
        },

        showToast(message, type = 'info') {
          const id = Date.now();
          this.toasts.push({ id, message, type });
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3500);
        },

        shake() {
          this.loginShake = true;
          setTimeout(() => { this.loginShake = false; }, 600);
        },
      }
    }
  </script>
</body>
</html>
